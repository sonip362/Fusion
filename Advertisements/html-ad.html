<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --accent-shop: #00d2ff;
            --accent-close: #333333;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Main Advertisement Wrapper */
        .ad-main-wrapper {
            display: flex;
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Left Side: 9:16 Video Section */
        .video-section {
            flex: 0 0 auto;
            width: calc(80vh * (9/16)); /* Dynamic width based on 9:16 ratio */
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Right Side: Description & UI Section */
        .content-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: #1a1a1a;
            color: var(--text-main);
        }

        .brand-name {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-shop);
            margin-bottom: 10px;
        }

        .product-title {
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            line-height: 1.1;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-dim);
            margin-bottom: 40px;
            max-width: 400px;
        }

        /* Action Buttons */
        .action-area {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-shop {
            background-color: var(--accent-shop);
            color: #000;
            flex: 2;
        }

        .btn-shop:hover {
            background-color: #128ee0ff;
            transform: translateY(-2px);
        }

        .btn-close {
            background-color: var(--accent-close);
            color: white;
            flex: 1;
        }

        .btn-close:hover {
            background-color: #44444463;
        }

        /* Responsive adjustment for small screens */
        @media (max-width: 768px) {
            .ad-main-wrapper {
                flex-direction: column;
                height: auto;
                width: 95%;
            }
            .video-section {
                width: 100%;
                height: 400px;
            }
        }
    </style>
</head>
<body>

    <div class="ad-main-wrapper" id="adModule">
        <div class="video-section">
            <video autoplay muted loop playsinline>
                <source src="Cool-Vibes.mp4" type="video/mp4">
            </video>
        </div>

        <div class="content-section">
            <span class="brand-name">Fusion</span>
            <h1 class="product-title">Urban Cool Vibes</h1>
            <p class="description">
                Experience the perfect blend of style and comfort with our latest collection. 
                Designed for the modern grn-z's who never stops moving.
            </p>

            <div class="action-area">
                <button class="btn btn-close" onclick="closeAdTab()">Close</button>
                <a href="https://sonip362.github.io/FUSI/" target="_blank" class="btn btn-shop">Shop Now</a>
            </div>
        </div>
    </div>

    <script>
        function closeAdTab() {
            // Attempt to close the tab
            window.close();
            
            // UI Fallback
            document.getElementById('adModule').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('adModule').style.display = 'none';
            }, 300);
        }
    </script>

</body>
</html>
