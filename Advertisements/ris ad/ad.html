<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fullscreen Ad Template</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base reset to lock the screen to the viewport */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevent scrolling */
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Use dynamic viewport height for better mobile browser support */
        .fullscreen-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            z-index: 50;
            /* Add safe area insets to prevent browser UI overlap */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* 16:9 Video constraints */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            /* object-fit: contain ensures the 16:9 video fits without cropping */
            object-fit: contain;
            background: #000;
        }

        /* Animations */
        @keyframes pulse-soft {

            0%,
            100% {
                transform: translateX(-50%) scale(1);
            }

            50% {
                transform: translateX(-50%) scale(1.05);
            }
        }

        .animate-cta {
            animation: pulse-soft 2s infinite ease-in-out;
        }
    </style>
</head>

<body>

    <!-- Main Ad UI -->
    <div id="ad-ui" class="fullscreen-container">

        <!-- Video Layer -->
        <div class="video-wrapper">
            <!-- Example 16:9 Video (Big Buck Bunny) -->
            <!-- Note: 'controls' removed to prevent pausing/seeking. 'muted' removed to enable audio. -->
            <video id="ad-video" autoplay playsinline muted>
                <source src="./RIS - Made with Clipchamp.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>



        <!-- Controls Overlay Layer -->
        <div class="absolute inset-0 pointer-events-none">

            <!-- Countdown Timer / Close Button -->
            <div id="countdown-timer"
                class="absolute top-4 right-4 md:top-6 md:right-6 bg-black/60 text-white rounded-full w-10 h-10 md:w-12 md:h-12 backdrop-blur-sm flex items-center justify-center border border-white/20 z-50 font-bold text-sm">
                10
            </div>

            <!-- Cancel / Close Button (Hidden initially) -->
            <button id="cancel-btn" onclick="closeAd()"
                class="hidden pointer-events-none absolute top-4 right-4 md:top-6 md:right-6 bg-black/60 hover:bg-black/90 text-white rounded-full p-2 md:p-3 backdrop-blur-sm transition-all flex items-center justify-center border border-white/20 z-50 group">
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5 md:h-6 md:w-6 group-hover:scale-110 transition-transform" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
                <span class="sr-only">Close Ad</span>
            </button>

            <!-- Mute/Unmute Toggle -->
            <button id="mute-toggle" onclick="toggleMute(event)"
                class="pointer-events-auto absolute bottom-4 left-4 bg-black/40 hover:bg-black/60 text-white rounded-full p-2 backdrop-blur-md border border-white/10 z-50 transition-all">
                <svg id="mute-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    <path id="mute-slash" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                </svg>
            </button>

            <!-- Visit Website CTA Button -->
            <a href="https://sonip362.github.io/RIS/" target="_blank" rel="noopener noreferrer"
                class="pointer-events-auto absolute bottom-8 md:bottom-12 left-1/2 transform -translate-x-1/2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 md:py-4 px-8 md:px-10 rounded-full shadow-[0_0_20px_rgba(37,99,235,0.5)] transition-all animate-cta z-50 text-sm md:text-base tracking-wide uppercase border border-blue-400/30">
                Visit Website
            </a>

        </div>
    </div>

    <!-- Fallback state if the browser blocks closing the tab -->
    <div id="closed-state" class="hidden fullscreen-container flex-col gap-4 text-center px-4">
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 max-w-md w-full shadow-2xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-green-500 mb-4" fill="none"
                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h2 class="text-white text-xl font-bold mb-2">Ad Closed</h2>
            <p class="text-gray-400 mb-6">You can now safely close this tab.</p>
            <button onclick="window.close()"
                class="bg-gray-800 hover:bg-gray-700 text-white font-medium py-2 px-6 rounded-lg transition-colors border border-gray-600">
                Force Close Tab
            </button>
        </div>
    </div>

    <script>
        // Handle Autoplay and Close Button Delay
        document.addEventListener("DOMContentLoaded", () => {
            const video = document.getElementById('ad-video');

            // Attempt to play automatically (muted)
            video.play().catch(error => {
                console.warn("Autoplay was prevented:", error);
            });

            // Countdown and Close Button Logic
            let timeLeft = 10;
            const timerElement = document.getElementById('countdown-timer');
            const cancelBtn = document.getElementById('cancel-btn');

            const countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    timerElement.innerText = timeLeft;
                } else {
                    clearInterval(countdownInterval);
                    timerElement.classList.add('hidden');
                    cancelBtn.classList.remove('hidden', 'pointer-events-none');
                    cancelBtn.classList.add('pointer-events-auto');
                }
            }, 1000);

            // Global click listener to unmute on first interaction
            const unmuteOnFirstClick = () => {
                if (video.muted) {
                    video.muted = false;
                    updateMuteUI();
                }
                document.removeEventListener('click', unmuteOnFirstClick);
                document.removeEventListener('touchstart', unmuteOnFirstClick);
            };

            document.addEventListener('click', unmuteOnFirstClick);
            document.addEventListener('touchstart', unmuteOnFirstClick);
        });

        function toggleMute(event) {
            event.stopPropagation(); // Prevent global click listener
            const video = document.getElementById('ad-video');
            video.muted = !video.muted;
            updateMuteUI();
        }

        function updateMuteUI() {
            const video = document.getElementById('ad-video');
            const slash = document.getElementById('mute-slash');
            if (video.muted) {
                slash.classList.remove('hidden');
            } else {
                slash.classList.add('hidden');
            }
        }

        // Function to handle closing the ad/tab
        function closeAd() {
            const video = document.getElementById('ad-video');

            // 1. Pause the video so audio stops playing
            if (video) {
                video.pause();
                video.removeAttribute('src');
                video.load();
            }

            // 2. Attempt to close the browser tab
            // Note: Modern browsers restrict window.close() to tabs that were opened by a script.
            try {
                window.close();
            } catch (e) {
                console.warn("Browser blocked window.close(). Showing fallback UI.");
            }

            // 3. Fallback: If the tab didn't close instantly, hide the ad UI and show the closed state
            setTimeout(() => {
                document.getElementById('ad-ui').style.display = 'none';

                // Show the fallback message
                const closedState = document.getElementById('closed-state');
                closedState.classList.remove('hidden');
                closedState.classList.add('flex');
            }, 150);
        }
    </script>
</body>

</html>
